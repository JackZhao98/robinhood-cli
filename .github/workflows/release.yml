name: release

# Trigger on any tag like v0.1.0, v1.2.3, v2.0.0-rc.1
on:
  push:
    tags:
      - 'v*'

permissions:
  # GoReleaser needs write access to create the GitHub Release.
  contents: write

jobs:
  goreleaser:
    name: Build & publish binaries
    runs-on: ubuntu-latest
    steps:
      - name: Check out source
        uses: actions/checkout@v4
        with:
          # GoReleaser needs full git history for changelog generation.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          check-latest: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
