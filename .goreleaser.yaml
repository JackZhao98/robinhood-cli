version: 2

project_name: rh

before:
  hooks:
    - go mod tidy

builds:
  - id: rh
    main: ./cmd/rh
    binary: rh
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    # Drop debug symbols to keep the binary small, inject build metadata
    # so `rh version` reports tag + short commit + UTC build time.
    # Matches the three vars in cmd/rh/main.go (version, commit, builtAt).
    ldflags:
      - -s -w
      - -X main.version=v{{ .Version }}
      - -X main.commit={{ .ShortCommit }}
      - -X main.builtAt={{ .Date }}

archives:
  - id: default
    # rh_1.2.1_darwin_arm64.tar.gz etc. GoReleaser's `.Version` template
    # var strips the leading "v" by convention; we keep that to stay
    # compatible with the assets already published in GitHub Releases.
    name_template: 'rh_{{ .Version }}_{{ .Os }}_{{ .Arch }}'
    formats:
      - tar.gz
    files:
      - README.md
      - LICENSE*

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

snapshot:
  version_template: '{{ .Tag }}-next'

release:
  draft: false
  prerelease: auto
  name_template: 'v{{ .Version }}'

changelog:
  use: github
  sort: asc
  groups:
    - title: Features
      regexp: '^.*?feat(\(.+\))??!?:.+$'
      order: 0
    - title: Fixes
      regexp: '^.*?fix(\(.+\))??!?:.+$'
      order: 1
    - title: Other
      order: 999
  filters:
    exclude:
      - '^docs:'
      - '^chore:'
      - '^ci:'
      - typo
